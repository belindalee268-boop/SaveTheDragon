levels:
  1: 
    topic: Basic Programming Constructs
    quests:
      - id: 1
        statement: "Write the function getKthDigit(n, k) that takes a possibly-
         negative int n and a non-negative int k and returns the kth digit in n.
         The 0th digit is the rightmost digit, and counting goes right to left."
        solution:
         - "def getKthDigit(n, k):"
         - "  n = abs(n)"
         - "  withoutLower = n // 10**(k)"
         - "  withoutUpper = withoutLower % 10"
         - "  return withoutUpper"
      - id: 2
        statement: "Write digitCount(n) that returns the number of digits in n."
        solution:
          - "def digitCount(n):"
          - "  n = abs(n)"
          - "  if n == 0:"
          - "    return 1"
          - "  else:"
          - "    numDigits = math.floor(math.log10(n)) + 1"
          - "    return numDigits"

  2:
    topic: Loops
    quests:
      - id: 1
        statement: "Write the function nthPrime(n) that takes a non-negative
         integer n and returns the nth prime number. 2 is the 0th prime number,
         3 is the 1st prime number, etc. Assume you are given isPrime(n)"
        solution:
          - "def nthPrime(n):"
          - "  primeCount = -1"
          - "  testPrime = 0"
          - "  while primeCount < n:"
          - "    testPrime += 1"
          - "    if isPrime(testPrime):"
          - "      primeCount += 1"
          - "  return testPrime"
      - id: 2
        statement: "Carryless Arithmetic is basic arithmetic but with the carry 
         from each column ignored. Write the function carrylessAdd(x, y) which
         takes two non-negative integers x and y and returns their carryless sum."
        solution:
          - "def carrylessAdd(x, y):"
          - "  turn = 0"
          - "  res = 0"
          - "  while (x > 0) or (y > 0):"
          - "    digit = (x % 10 + y % 10) % 10"
          - "    res += digit * 10**turn"
          - "    x, y = x // 10, y // 10"
          - "    turn += 1"
          - "  return res"
  3: 
    topic: Strings
    quests:
      - id: 1
        statement: "Write the function interleave(s1, s2) that takes two strings,
         s1 and s2, and returns a string composed of alternating characters from s1
         and s2. If one string is longer than the other, concatenate the rest of 
         the remaining string onto the end of the new string."
        solution:
          - "def interleave(s1, s2):"
          - "  result = ''"
          - "  index = 0"
          - "  while index < len(s1) or index < len(s2):"
          - "    if index < len(s1):"
          - "      result += s1[index]
          - "    if index < len(s2):"
          - "      result += s2[index]"
          - "    index += 1"
          - "  return result"
      - id: 2
        statement: "We say that parentheses are balanced if each right parenthesis
         closes an open left parenthesis, and no left parentheses are left unclosed
         at the end of the text. Write the function hasBalancedParentheses(s), which
         takes a string s and returns True if s has balanced parentheses and False otherwise"
        solution:
          - "def hasBalancedParentheses(s):"
          - "  if s.count('(') == s.count(')') == 0:"
          - "    return True"
          - "  if s.startswith('(') and s.endswith(')'):"
          - "    if s.count('(') == s.count(')'):"
          - "      return True"
          - "  return False"
  
  4: 
    topic: 1D Lists
    quests:
      - id: 1
        statement: "The dot product of two lists is the sum of the products of
         corresponding terms. With this in mind, write the non-mutating function
         dotProduct(L, M), which takes two lists of integers L and M, and returns the 
         dot product of the lists. If the lists are not of equal lengths, ignore the
         extra elements in the longer list."
        solution:
          - "def dotProduct(L, M):"
          - "  length = min(len(L), len(M))"
          - "  res = 0"
          - "  for i in range(length):"
          - "    res += L[i] * M[i]"
          - "  return res"
      - id: 2
        statement: "We can represent a polynomial as a list of its coefficients. For
         example, we will represent the polynomial 2x3 + 3x2 + 4 with the list [2, 3, 0, 4].
         With this in mind, write the function multiplyPolynomials(p1, p2), which takes
         two lists representing polynomials as described above, and returns the list
         representing the polynomial that is the product of p1 and p2."
        solution:
          - "def multiplyPolynomials(p1, p2):"
          - "  deg1 = len(p1) - 1"
          - "  deg2 = len(p2) - 1"
          - "  resultDeg = deg1 + deg2"
          - "  result = [0] * (resultDeg + 1)"
          - "  for i in range(len(p1)):"
          - "    for j in range(len(p2)):"
          - "      result[i + j] += p1[i] * p2[j]"
          - "  return result"
  
  5: 
    topic: 2D Lists
    quests:
      - id: 1
        statement: "Write the function mutatingRemoveRowAndCol(L, targetRow, targetCol) which
         takes a 2d list L and two integers representing a row and column that will be removed.
         Your function should mutate the original list to remove the given row and column."
        solution:
          - "def mutatingRemoveRowAndCol(L, targetRow, targetCol):"
          - "  if 0 <= targetRow < len(L):"
          - "    L.pop(targetRow)"
          - "  for row in range(len(L)):"
          - "    if 0 <= targetCol < len(L[row]):"
          - "      L[row].pop(targetCol)"
          - "  print(L)"
      - id: 2
        statement: "Write the function nonmutatingRemoveRowAndCol(L, targetRow, targetCol),
         which works the same as the previous function, only this version is non-mutating.
         It does not modify L, and it returns a new list with the given row and column removed."
        solution:
          - "def nonmutatingRemoveRowAndCol(L, targetRow, targetCol):"
          - "  res = []"
          - "  for row in range(len(L)):"
          - "    if row == targetRow:"
          - "      continue"
          - "    newRow = L[row][:targetCol] + L[row][targetCol + 1:]"
          - "    res.append(newRow)"
          - "  return res"
  
