levels:
  1: 
    topic: Basic Programming Constructs
    quests:
      - id: 1
        statement: "Write the function getKthDigit(n, k) that takes a possibly-
         negative int n and a non-negative int k and returns the kth digit in n.
         The 0th digit is the rightmost digit, and counting goes right to left."
        solution:
         - "def getKthDigit(n, k):"
         - "  n = abs(n)"
         - "  withoutLower = n // 10**(k)"
         - "  withoutUpper = withoutLower % 10"
         - "  return withoutUpper"
      - id: 2
        statement: "Write digitCount(n) that returns the number of digits in n."
        solution:
          - "def digitCount(n):"
          - "  n = abs(n)"
          - "  if n == 0:"
          - "    return 1"
          - "  else:"
          - "    numDigits = math.floor(math.log10(n)) + 1"
          - "    return numDigits"

