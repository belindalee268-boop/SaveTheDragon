  6: #this is level 6 for all intents and purposes right now, actually is 8
    topic: Sets, Dicts, Efficiency
    quests:
      - id: 1
        statement: "Write the function repeats(L) which takes a list L and returns a
         sorted list of all the repeated elements in L. Recall that in this unit, you
         cannot create new lists or mutate existing lists. Instead, think of a clever
         way to use sets to solve the problem."
        solution:
          - "def repeats(L):"
          - "  s = set(L)"
          - "  res = []"
          - "  for v in L:"
          - "    if L.count(v) > 1:"
          - "      if v not in res:"
          - "        res.append(v)"
          - "  return sorted(res)"
      - id: 2
        statement: "A friend-of-friend of a person is a friend of one of that person's
         friends. Write the function friendsOfFriends(friends), which takes a dictionary
         mapping people to sets of their friends, and returns a dictionary mapping people
         to sets of their friends-of-friends."
        solution:
          - "def friendsOfFriends(friends):"
          - "  fofDict = dict()"
          - "  for name in friends:"
          - "    fofDict[name] = set()"
          - "    for friend in friends[name]:"
          - "      for fof in friends[friend]:"
          - "        if fof != name and fof not in friends[name]:"
          - "          fofDict[name].add(fof)"
          - "  return fofDict"
      - id: 3
        statement: "Write the function getPairSum(L, target) which takes a list L of
         integers and a target value (also an integer), and returns a pair of numbers 
         from L as a tuple if they add up to the given target number. If no such pair 
         exists, it returns None. If there is more than one valid pair, you can return 
         any of them. Your solution must run in no worse than O(N) time"
        solution:
          - "def getPairSum(L, target):"
          - "  seen = set()"
          - "  for num in L:"
          - "    complement = target - num"
          - "    if complement in seen:"
          - "      return (num, complement)"
          - "    seen.add(num)"
          - "  return None"
  
  7: # should be 9
    topic: Recursion
    quests:
      - id: 1
        statement: "A powerset consists of all the possible subsets of a given collection
         of elements. In this exercise, subsets will be represented as lists. Write the
         function powerSet(L) that takes a list of integers L and returns a sorted list
         representing the powerset of L."
        solution:
          - "def powerset(L):"
          - "  res = []"
          - "  if L == []:"
          - "    res.append([])"
          - "  else:"
          - "    res.extend(powerset(L[1:]))"
          - "    for i in range(len(res)):"
          - "      res.append([L[0]] + res[i])"
          - "  return sorted(res)"
      - id: 2
        statement: "Write the function getTreeValues(tree) that takes a tree and
         returns a set of all the values in that tree. You may assume that all 
         values in the tree are immutable."
        solution:
          - "def getTreeValues(tree):"
          - "  res = {tree.value}"
          - "  if tree.isLeaf():"
          - "    res.add(tree.value)"
          - "  else:"
          - "    for child in tree.children:"
          - "      res.add(child.value)"
          - "      res = res | getTreeValues(child)"
          - "  return res"
  
